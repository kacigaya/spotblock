<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <style>
    .shield-stroke {
      fill: none;
      stroke: #f35b30;
      stroke-width: 10;
      stroke-linejoin: round;
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: drawLine 1s ease-out forwards;
    }
    .shield-fill-left {
      fill: #2e7d32;
      opacity: 0;
      animation: fadeIn 0.4s ease-out 0.9s forwards;
    }
    .shield-fill-right {
      fill: #388e3c;
      opacity: 0;
      animation: fadeIn 0.4s ease-out 0.9s forwards;
    }
    .wave {
      fill: none;
      stroke: #1a1a1a;
      stroke-linecap: round;
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
    }
    .wave-1 { stroke-width: 10; animation: drawLine 0.5s ease-out 1.1s forwards; }
    .wave-2 { stroke-width: 14; animation: drawLine 0.5s ease-out 1.3s forwards; }
    .wave-3 { stroke-width: 18; animation: drawLine 0.5s ease-out 1.5s forwards; }
    .slash-bg {
      fill: none;
      stroke: #f35b30;
      stroke-width: 20;
      stroke-linecap: round;
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawLine 0.4s cubic-bezier(0.7, 0, 0.2, 1) 1.9s forwards;
    }
    .slash-fg {
      fill: none;
      stroke: #ffffff;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: drawLine 0.4s cubic-bezier(0.7, 0, 0.2, 1) 2.05s forwards;
    }
    @keyframes drawLine { to { stroke-dashoffset: 0; } }
    @keyframes fadeIn   { to { opacity: 1; } }
  </style>

  <g transform="translate(200, 200)">
    <path class="shield-fill-right"
      d="M 0,-108 C 55,-108 105,-122 105,-122 L 105,58 C 105,128 0,185 0,185 Z"/>
    <path class="shield-fill-left"
      d="M 0,-108 C -55,-108 -105,-122 -105,-122 L -105,58 C -105,128 0,185 0,185 Z"/>
    <path class="shield-stroke"
      d="M 0,-108
         C 55,-108 105,-122 105,-122
         L 105,58
         C 105,128 0,185 0,185
         C 0,185 -105,128 -105,58
         L -105,-122
         C -105,-122 -55,-108 0,-108 Z"/>

    <path class="wave wave-1" d="M -28,60 C -10,44 10,44 28,60"/>
    <path class="wave wave-2" d="M -54,34 C -22,8  22,8  54,34"/>
    <path class="wave wave-3" d="M -80,8  C -36,-28 36,-28 80,8"/>

    <line class="slash-bg" x1="-72" y1="130" x2="72" y2="-72"/>
    <line class="slash-fg"  x1="-72" y1="130" x2="72" y2="-72"/>
  </g>

</svg>
